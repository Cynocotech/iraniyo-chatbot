<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ایرانیانو – دستیاران هوشمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #22263a;
    --accent: #6c63ff; --accent2: #00c9a7;
    --text: #e8eaf0; --muted: #8891a5; --border: #2e3349;
    --font: 'Vazirmatn', Tahoma, sans-serif;
  }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  .header { text-align: center; margin-bottom: 40px; }
  .logo { font-size: 42px; margin-bottom: 12px; }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .header p { color: var(--muted); font-size: 14px; }

  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 700px;
  }

  .agent-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .2s, transform .15s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }
  .agent-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(108,99,255,.08), rgba(0,201,167,.04));
    opacity: 0;
    transition: opacity .2s;
  }
  .agent-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 32px rgba(108,99,255,.18); }
  .agent-card:hover::before { opacity: 1; }

  .agent-icon { font-size: 36px; }
  .agent-name { font-size: 18px; font-weight: 700; }
  .agent-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .agent-arrow {
    margin-top: 6px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .loading { color: var(--muted); font-size: 14px; text-align: center; padding: 40px; }

  @media (max-width: 480px) {
    .agents-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🤖</div>
  <h1>دستیاران هوشمند ایرانیانو</h1>
  <p>یک دستیار را انتخاب کنید</p>
</div>

<div class="agents-grid" id="grid">
  <div class="loading">در حال بارگذاری…</div>
</div>

<script>
async function loadAgents() {
  try {
    const res = await fetch('/agents');
    const agents = await res.json();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    agents.forEach(a => {
      const card = document.createElement('a');
      card.className = 'agent-card';
      card.href = `/chat/${a.slug}`;
      card.innerHTML = `
        <div class="agent-icon">${a.icon}</div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-desc">${a.description}</div>
        <div class="agent-arrow">شروع گفتگو ←</div>`;
      grid.appendChild(card);
    });
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="loading">خطا در بارگذاری: ${e.message}</div>`;
  }
}
loadAgents();
</script>
</body>
</html>
